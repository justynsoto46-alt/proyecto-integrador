        <section class="section">

                <h2>Crear nuevo Stand</h2>

                <form class="formulario" action="#"  method="post">
                    <label for="Nombre">Nombre Encargado </label>
                        <input type="text" name="Nombre Representante" id="Nombre Representante" placeholder="Juan Perez" required>
                    <label for="correo">Correo Electronico </label>
                        <input type="email" name="correo" id="correo"correo placeholder="ejemplo@correo.com" required>

                    <label for="texto">Descripcion
                        <input type="text" name="numero" id="Descripcion"placeholder="Habla del Representante" required>
                    </label>

                    <label for="clave">Telefono
                        <input type="number" name="numero" id="numero" placeholder="84502036" required>
                    </label>

                    <label for="rol">Seleccione un evento Asociado</label>
                    <select name="rol" id="rol">
                        <option value="defecto">Seleccione una Opcion</option>
                        <option value="">
                        </option>
                    </select>


                    <label for="rol">Seleccione un Estado del Stand</label>
                    <select name="rol" id="rol">
                        <option value="defecto">Seleccione una Opcion</option>
                        <option value="Activo">
                        Activo
                        </option>
                        <option value="Desactivado">
                        Desactivado
                        </option>
                        <option value="pendiente">
                        Pendiente
                        </option>
                    </select>

                    <button type="submit" class="boton boton-primario boton-bloque boton-lg" id="boton-ingresar">

                        Crear Stand</button>
                </form>
