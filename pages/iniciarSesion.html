<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENFOTEC Página Web Eventos - Inicio de Sesión</title>

    <!--FontAwesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/iniciarSesion.css">
</head>
<body>
    <header class="encabezado">
        <div class="contenedor">
            <img src="/img/LogoBlanco.png" alt="Logo de CENFOTEC" class="logo">
            <h1>CENFOTEC Página Web Eventos</h1>
        </div>
    </header>

    <main>
        <section class="seccion-login">

            <div class="contenedor-volver">
                <a href="/index.html" class="enlace-volver"> 
                    <i class="fa-solid fa-chevron-left"></i>
                    Volver
                </a>
            </div>

            <div class="contenedor">
                <h2>Inicio de Sesión</h2>

                <div class="formulario-contenedor">
                    <form class="formulario" id= "formulario" action="#" method="post">
                        <label for="correo">Correo electrónico</label>
                        <input type="email" id="correo" name="correo" required>

                        <label for="contrasenia">Contraseña</label>
                        <input type="password" id="contrasenia" name="contrasenia" required>

                        <button type="submit">Iniciar Sesión</button>
                    </form>

                    <a href="/pages/modificarContrasenia.html" class="enlace-recuperar">¿Olvidó su contraseña?</a>
                </div>
            </div>
        </section>
    </main>
    
    <footer>
        <h2>Somos lo que sabemos </h2>
        <p>&copy; 2026 Universidad Cenfotec </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/iniciarSesion.js"></script>
</body>
</html>
