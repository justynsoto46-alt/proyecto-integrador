<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Actividad</title>

    <!-- FontAwesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/menuPrincipal.css">
    <link rel="stylesheet" href="/css/modificarActividad.css">
</head>
<body>
    <header class="encabezado">

        <div class="contenedor">

            <img src="/img/LogoBlanco.png" alt="Logo de CENFOTEC" class="logo">

            <h1>CENFOTEC Página Web Eventos</h1>

            <div class="usuario">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-user"></i>
                <span>Administrador</span>
            </div>

        </div>

    </header>

    <main>

        <aside class="menu-lateral">
            <nav>
                <a href="/pages/DashBoard/menuPrincipal.html">
                    <i class="fa-solid fa-location-dot"></i>
                    Dashboard
                </a>

                <a href="/pages/Administrador/listarAdmin.html">
                    <i class="fa-solid fa-user-plus"></i>
                    Administradores
                </a>

                <a href="/pages/Evento/registrarEvento.html">
                    <i class="fa-solid fa-award"></i>
                    Eventos
                </a>

                <a href="/pages/Actividad/moduloActividad.html">
                    <i class="fa-solid fa-book-open"></i>
                    Actividades
                </a>

                <a href="/pages/Stands/listarStands.html">
                    <i class="fa-solid fa-cube"></i>
                    Stands
                </a>

                <a href="/pages/Participantes/participantes.html">
                    <i class="fa-solid fa-users"></i>
                    Participantes
                </a>

                <a href="/pages/gestionarInscripciones.html">
                    <i class="fa-solid fa-clipboard"></i>
                    Inscripciones
                </a>

                <a href="/pages/Agenda/consultarAgenda.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Agenda
                </a>

                <a href="/pages/Responsables/listarResponsables.html">
                    <i class="fa-solid fa-user-tie"></i>
                    Responsables
                </a>

                <a href="/pages/DashBoard/pagoSimulado.html">
                    <i class="fa-solid fa-credit-card"></i>
                    Pagos
                </a>

                <a href="#" id="cerrarSesion" class="cerrar-sesion">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar Sesión
                </a>
            </nav>
        </aside>
    

        <section class="section">

            <div class="contenedor tarjeta-actividad">

                <h2>Modificar Actividad</h2>

                <form class="formulario" action="#" method="post">

                    <label for="idActividad">
                        ID de la Actividad
                    </label>

                    <input
                        type="text"
                        id="idActividad"
                        name="idActividad"
                        value="ACT-001"
                        readonly>

                    <label for="nombreActividad">
                        Nombre de la Actividad
                    </label>

                    <input
                        type="text"
                        id="nombreActividad"
                        name="nombreActividad"
                        value="Conferencia de Inteligencia Artificial"
                        required>

                    <label for="categoria">
                        Categoría
                    </label>

                    <select
                        id="categoria"
                        name="categoria"
                        required>

                        <option value="Tecnológica" selected>Tecnológica</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Deportiva">Deportiva</option>
                        <option value="Artística">Artística</option>
                        <option value="Recreación">Recreación</option>
                        <option value="Voluntariado">Voluntariado</option>

                    </select>

                    <label for="descripcion">
                        Descripción
                    </label>

                    <textarea
                        id="descripcion"
                        name="descripcion"
                        rows="5"
                        required>Actividad enfocada en tendencias actuales de IA.</textarea>

                    <label for="fecha">
                        Fecha
                    </label>

                    <input
                        type="date"
                        id="fecha"
                        name="fecha"
                        value="2026-08-15"
                        required>

                    <label for="horaInicio">
                        Hora de Inicio
                    </label>

                    <input
                        type="time"
                        id="horaInicio"
                        name="horaInicio"
                        value="09:00"
                        required>

                    <label for="horaFin">
                        Hora de Finalización
                    </label>

                    <input
                        type="time"
                        id="horaFin"
                        name="horaFin"
                        value="11:00"
                        required>

                    <label for="espacio">
                        Espacio o Sede
                    </label>

                    <input
                        type="text"
                        id="espacio"
                        name="espacio"
                        value="Auditorio Principal"
                        required>

                    <label for="cupo">
                        Cupo Máximo
                    </label>

                    <input
                        type="number"
                        id="cupo"
                        name="cupo"
                        value="100"
                        min="1"
                        required>

                    <label for="responsable">
                        Responsable
                    </label>

                    <select
                        id="responsable"
                        name="responsable"
                        required>

                        <option value="Juan Pérez" selected>Juan Pérez</option>
                        <option value="María Gómez">María Gómez</option>
                        <option value="Carlos Mora">Carlos Mora</option>

                    </select>

                    <label for="estado">
                        Estado
                    </label>

                    <select id="estado" name="estado" required>
                    <option value="Activo" selected>Activo</option>
                    <option value="Suspendido">Suspendido</option>
                    <option value="Finalizada">Finalizada</option>
                    <option value="Cancelada">Cancelada</option>
                </select>

                    <button
                        type="submit"
                        class="boton boton-primario">

                        Guardar Cambios

                    </button>

                </form>

            </div>

        </section>

    </main>

    <footer>

        <h2>Somos lo que sabemos</h2>

        <p>&copy; 2026 Universidad CENFOTEC</p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/cerrarSesion.js"></script>

</body>
</html>
