<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Actividad</title>

    <!-- FontAwesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/menuPrincipal.css">
    <link rel="stylesheet" href="/css/registrarActividad.css">
</head>

<body>

    <header class="encabezado">

        <div class="contenedor">

            <img src="/img/LogoBlanco.png" alt="Logo de CENFOTEC" class="logo">

            <h1>CENFOTEC Página Web Eventos</h1>

            <div class="usuario">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-user"></i>
                <span>Administrador</span>
            </div>

        </div>

    </header>

    <main>

        <aside class="menu-lateral">
            <nav>
                <a href="/pages/DashBoard/menuPrincipal.html">
                    <i class="fa-solid fa-location-dot"></i>
                    Dashboard
                </a>

                <a href="/pages/Administrador/listarAdmin.html">
                    <i class="fa-solid fa-user-plus"></i>
                    Administradores
                </a>

                <a href="/pages/Evento/registrarEvento.html">
                    <i class="fa-solid fa-award"></i>
                    Eventos
                </a>


                <a href="/pages/Actividad/moduloActividad.html">
                    <i class="fa-solid fa-book-open"></i>
                    Actividades
                </a>

                <a href="/pages/Stands/listarStands.html">
                    <i class="fa-solid fa-cube"></i>
                    Stands
                </a>

                <a href="/pages/Participantes/participantes.html">
                    <i class="fa-solid fa-users"></i>
                    Participantes
                </a>

                <a href="/pages/gestionarInscripciones.html">
                    <i class="fa-solid fa-clipboard"></i>
                    Inscripciones
                </a>

                <a href="/pages/Agenda/consultarAgenda.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Agenda
                </a>

                <a href="/pages/Responsables/listarResponsables.html">
                    <i class="fa-solid fa-user-tie"></i>
                    Responsables
                </a>

                <a href="/pages/DashBoard/pagoSimulado.html">
                    <i class="fa-solid fa-credit-card"></i>
                    Pagos
                </a>

                <a href="#" id="cerrarSesion" class="cerrar-sesion">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar Sesión
                </a>
            </nav>
        </aside>

        <section class="section">

            <div class="contenedor tarjeta-actividad">

                <h2>Registrar Actividad</h2>

<form id="formularioActividad" class="formulario" action="#" method="post" novalidate>

                    <label for="nombreActividad">
                        Nombre de la Actividad
                    </label>

                    <input
                        type="text"
                        id="nombreActividad"
                        name="nombreActividad"
                        placeholder="Ingrese el nombre de la actividad"
                        required>

                    <label for="eventoAsociado">
                        Evento Asociado
                    </label>

                    <input
                        type="text"
                        id="eventoAsociado"
                        name="eventoAsociado"
                        placeholder="Ej. Maker Fair 2026"
                        required>

                    <label for="categoria">
                        Categoría
                    </label>

                    <select
                        id="categoria"
                        name="categoria"
                        required>

                        <option value="">
                            Seleccione una categoría
                        </option>

                        <option value="Cultural">
                            Cultural
                        </option>

                        <option value="Deportiva">
                            Deportiva
                        </option>

                        <option value="Tecnologica">
                            Tecnológica
                        </option>

                        <option value="Artistica">
                            Artística
                        </option>

                        <option value="Recreacion">
                            Recreación
                        </option>

                        <option value="Voluntariado">
                            Voluntariado
                        </option>

                    </select>

                    <label for="descripcion">
                        Descripción
                    </label>

                    <textarea
                        id="descripcion"
                        name="descripcion"
                        rows="5"
                        placeholder="Ingrese la descripción de la actividad"
                        required></textarea>

                    <label for="fecha">
                        Fecha
                    </label>

                    <input
                        type="date"
                        id="fecha"
                        name="fecha"
                        required>

                    <label for="horaInicio">
                        Hora de inicio
                    </label>

                    <input
                        type="time"
                        id="horaInicio"
                        name="horaInicio"
                        required>

                    <label for="horaFin">
                        Hora de finalización
                    </label>

                    <input
                        type="time"
                        id="horaFin"
                        name="horaFin"
                        required>

                    <label for="ubicacion">
                        Ubicación
                    </label>

                    <select
                        id="ubicacion"
                        name="ubicacion"
                        required>

                        <option value="">
                            Seleccionar Ubicación
                        </option>

                        <option value="Auditorio Principal">
                            Auditorio Principal
                        </option>

                        <option value="Laboratorio 1">
                            Laboratorio 1
                        </option>

                        <option value="Parqueo">
                            Parqueo
                        </option>

                        <option value="Externo">
                            Externo (fuera del campus)
                        </option>

                    </select>

                    <label for="cupo">
                        Cupo Máximo
                    </label>

                    <input
                        type="number"
                        id="cupo"
                        name="cupo"
                        min="1"
                        placeholder="Ingrese el cupo máximo"
                        required>

                    <label for="responsable">
                        Responsable
                    </label>

                    <select
                        id="responsable"
                        name="responsable"
                        required>

                        <option value="">
                            Seleccione un responsable
                        </option>

                        <option value="1">
                            Juan Pérez
                        </option>

                        <option value="2">
                            María Rodríguez
                        </option>

                        <option value="3">
                            Carlos Ramírez
                        </option>

                    </select>

                    <label for="estado">
                        Estado

            </div>

        </section>

    </main>

    <footer>

        <h2>Somos lo que sabemos</h2>

        <p>&copy; 2026 Universidad CENFOTEC</p>

    </footer>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/cerrarSesion.js"></script>
    <script src="/js/registrarActividad.js"></script>
</body>

</html>
