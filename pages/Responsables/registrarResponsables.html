<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Responsables</title>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/menuPrincipal.css">
    <link rel = "stylesheet" href = "/css/registrarResponsables.css">
</head>
<body>
    <header class="encabezado">
        <div class="contenedor">
            <img src="/img/LogoBlanco.png" alt="Logo de CENFOTEC" class="logo">
            <h1>CENFOTEC Página Web Eventos</h1>

            <div class="usuario">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-user"></i>
                <span>Administrador</span>
            </div>
        </div>
    </header>
    <main>
        <aside class="menu-lateral">
            <nav>
                <a href="/pages/DashBoard/menuPrincipal.html">
                    <i class="fa-solid fa-location-dot"></i>
                    Dashboard
                </a>

                <a href="/pages/Administrador/listarAdmin.html">
                    <i class="fa-solid fa-user-plus"></i>
                    Administradores
                </a>

                <a href="/pages/Evento/moduloEvento.html">
                    <i class="fa-solid fa-award"></i>
                    Eventos
                </a>

                <a href="/pages/Actividad/moduloActividad.html">
                    <i class="fa-solid fa-book-open"></i>
                    Actividades
                </a>

                <a href="/pages/Stands/listarStands.html">
                    <i class="fa-solid fa-cube"></i>
                    Stands
                </a>

                <a href="/pages/Participantes/participantes.html">
                    <i class="fa-solid fa-users"></i>
                    Participantes
                </a>

                <a href="/pages/Agenda/consultarAgenda.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Agenda
                </a>

                <a href="/pages/Responsables/listarResponsables.html">
                    <i class="fa-solid fa-user-tie"></i>
                    Responsables
                </a>

                <a href="/pages/DashBoard/pagoSimulado.html">
                    <i class="fa-solid fa-credit-card"></i>
                    Pagos
                </a>

                <a href="#" id="cerrarSesion" class="cerrar-sesion">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Cerrar Sesión
                </a>
            </nav>
        </aside>

        <section class="section">

            <div class="contenedor tarjeta-Inicio-Sesion">
                <h2>Crear nuevo Responsable</h2>
                <form id="formularioResponsable" class="formulario" action="#"  method="post" novalidate>
                    <label for="Nombre">Nombre Completo 
                        <input type="text" name="Nombre Completo" id="nombre" placeholder="Juan Perez " required>
                    </label>
                    <label for="correo">Correo Electronico 
                        <input type="email" name="correo" id="correo" placeholder="ejemplo@correo.com" required>
                    </label>
                    <label for="institucion">Institución
                        <input type="text" name="institucion" id="institucion" placeholder="Microsoft" required>
                    </label>
                    
                    <div id="contenedor-telefonos">
                        <label>Teléfono
                            <input type="tel" name="telefono" placeholder="88888888" required>
                        </label>
                    </div>
            
                    <button type="button" class="boton boton-primario boton-bloque boton-lg" id="btnAgregarTelefono">
                    + Agregar otro teléfono
                    </button>

                    <label for="fechaRegistro"> Fecha De Registro
                        <input type="date" id="fechaRegistro" name="fechaRegistro" readonly>
                    </label>
                
                    <label for="biografia">
                        Biografía
                        <textarea
                        id="biografia"
                        name="biografia"
                        rows="5"
                        placeholder="Ingrese la biografía del Responsable"
                        required></textarea>
                    </label>
                    
                    <label for="subirImagen" class="btn-subir-archivo">
                        <i class="fa-solid fa-upload"></i> Seleccionar Imagen
                    </label>

                    <!-- Ocultamos el input real -->
                    <input type="file" id="subirImagen" accept="image/*" style="display: none;">
                    <button type="submit" class="boton boton-primario boton-bloque boton-lg" id="boton-ingresar">
                        Crear Responsable</button>
                </form>
            </div>
        </section>
    </main>


    <footer>
        <h2>Somos lo que sabemos </h2>
        <p>&copy; 2026 Universidad Cenfotec </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/cerrarSesion.js"></script>
    <script src="/js/registrarResponsable.js"></script>
</body>
</html>
