<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Evento</title>

    <!-- FontAwesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/css/menuPrincipal.css">
    <link rel="stylesheet" href="/css/registrarEvento.css">
</head>
<body>
<section class="section">

    <div class="contenedor tarjeta-evento">

        <h2>Registrar Evento</h2>

        <form class="formulario">

        ...

        </form>

    </div>

</section>
<label for="nombre"></label>
<input id="nombre">
<label for="nombreEvento">
Nombre del Evento
</label>

<input
type="text"
id="nombreEvento"
name="nombreEvento"
required>
<label for="descripcion">
Descripción
</label>

<textarea
id="descripcion"
name="descripcion"
required>
</textarea>
<label for="fechaInicio">
Fecha de inicio
</label>

<input
type="date"
id="fechaInicio"
name="fechaInicio">

<label for="ubicacion">
Ubicación
</label>

<input
type="text"
id="ubicacion"
name="ubicacion">
<option value="">
Seleccione una opción
</option>

<option value="activo">
Activo
</option>

<option value="cancelado">
Cancelado
</option>

<option value="finalizado">
Finalizado
</option>

</select>


<button
type="submit"
class="boton boton-primario boton-bloque boton-lg">
Guardar Evento
</button>

</body>
